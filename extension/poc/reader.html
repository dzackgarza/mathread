<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>MathRead Reader POC</title>
    <link rel="stylesheet" href="reader.css" />
  </head>
  <body>
    <!--
      Layout reproduces Google Scholar Reader's chrome from real screenshots
      (~/Pictures/Screenshots/screenshot_260703_0758*): dark toolbar, a floating
      left tab-rail (Outline / AI Outline / Pages) that collapses to icon chips,
      and a right Highlights panel. Icons are inline Material-Symbols paths.
    -->
    <header class="toolbar">
      <div class="tb-group tb-left">
        <span class="logo" aria-hidden="true">
          <svg viewBox="0 0 24 24" width="24" height="24">
            <rect x="10" y="5" width="4" height="15" rx="1" fill="#4285f4" />
            <rect x="15" y="9" width="4" height="11" rx="1" fill="#4285f4" />
            <rect x="3.5" y="7" width="4" height="13" rx="1" fill="#5b9bff" transform="rotate(-18 5.5 13.5)" />
          </svg>
        </span>
        <span id="doc-title" class="doc-title">Loading…</span>
        <button id="backend-light" class="backend-light checking" title="Checking MathRead backend…" aria-label="MathRead backend status"></button>
      </div>

      <div class="tb-group tb-center">
        <button id="prev-page" class="tb-btn" title="Previous page">
          <svg viewBox="0 0 24 24"><path d="M15.41 7.41 14 6l-6 6 6 6 1.41-1.41L10.83 12z" /></svg>
        </button>
        <input id="page-input" class="page-input" type="text" inputmode="numeric" value="–" />
        <span class="page-total">/&nbsp;<span id="page-total">–</span></span>
        <button id="next-page" class="tb-btn" title="Next page">
          <svg viewBox="0 0 24 24"><path d="M10 6 8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z" /></svg>
        </button>

        <span class="tb-divider"></span>

        <button id="zoom-out" class="tb-btn" title="Zoom out">
          <svg viewBox="0 0 24 24"><path d="M19 13H5v-2h14v2z" /></svg>
        </button>
        <span id="zoom-level" class="zoom-pill">100%</span>
        <button id="zoom-in" class="tb-btn" title="Zoom in">
          <svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z" /></svg>
        </button>

        <span class="tb-divider"></span>

        <button id="fit-width" class="tb-btn" title="Fit to width">
          <svg viewBox="0 0 24 24"><path d="M17 4h3c.55 0 1 .45 1 1v3h-2V6h-2V4zM4 8V6h2V4H3c-.55 0-1 .45-1 1v3h2zm16 8v2h-2v2h3c.55 0 1-.45 1-1v-3h-2zM6 18H4v-3H2v3c0 .55.45 1 1 1h3v-2z" /></svg>
        </button>
        <button id="rotate" class="tb-btn" title="Rotate clockwise">
          <svg viewBox="0 0 24 24"><path d="M15.55 5.55 11 1v3.07C7.06 4.56 4 7.92 4 12s3.05 7.44 7 7.93v-2.02c-2.84-.48-5-2.94-5-5.91s2.16-5.43 5-5.91V10l4.55-4.45zM19.93 11c-.17-1.39-.72-2.73-1.62-3.89l-1.42 1.42c.54.75.88 1.6 1.02 2.47h2.02zM13 17.9v2.02c1.39-.17 2.74-.71 3.9-1.61l-1.44-1.44c-.75.54-1.59.89-2.46 1.03zm3.89-2.42 1.42 1.41c.9-1.16 1.45-2.5 1.62-3.89h-2.02c-.14.87-.48 1.72-1.02 2.48z" /></svg>
        </button>
        <button id="search-toggle" class="tb-btn" title="Find in document">
          <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z" /></svg>
        </button>
      </div>

      <div class="tb-group tb-right">
        <button id="toggle-sidebar" class="tb-btn" title="Highlights">
          <svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-1.99.9-1.99 2L2 22l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zM6 9h12v2H6V9zm8 5H6v-2h8v2zm4-6H6V6h12v2z" /></svg>
        </button>
        <button id="cite" class="tb-btn" title="Cite">
          <svg viewBox="0 0 24 24"><path d="M6 17h3l2-4V7H5v6h3zm8 0h3l2-4V7h-6v6h3z" /></svg>
        </button>
        <div class="more-wrap">
          <button id="scholar-menu-btn" class="tb-btn" title="Google Scholar">
            <svg viewBox="0 0 21 21" fill-rule="evenodd"><path d="M19 9L10.5 2.2L2 9L6 12.1C5.6 12.7 5.5 13.3 5.5 14 C5.5 16.8 7.7 19 10.4 19C13.2 19 15.4 16.8 15.4 14 C15.4 13.3 15.3 12.7 15 12.1L19 9ZM14.2 10.8L16.6 9L10.5 4.1L4.3 9 L6.7 10.8C7.6 9.8 9 9.1 10.4 9.1C12 9.1 13.3 9.8 14.2 10.8Z M8.5 11.2C9.1 10.8 9.7 10.6 10.4 10.6C11.2 10.6 11.8 10.8 12.4 11.2H8.5Z M7.3 12.7H13.6C13.8 13.1 14 13.5 14 14C14 16 12.4 17.5 10.4 17.5 C8.5 17.5 7 16 7 14C7 13.5 7.1 13.1 7.3 12.7Z" /></svg>
          </button>
          <div id="scholar-menu" class="more-menu scholar-menu"></div>
        </div>
        <button id="download" class="tb-btn" title="Download">
          <svg viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z" /></svg>
        </button>
        <button id="print" class="tb-btn" title="Print">
          <svg viewBox="0 0 24 24"><path d="M19 8H5c-1.66 0-3 1.34-3 3v6h4v4h12v-4h4v-6c0-1.66-1.34-3-3-3zm-3 11H8v-5h8v5zm3-7c-.55 0-1-.45-1-1s.45-1 1-1 1 .45 1 1-.45 1-1 1zm-1-9H6v3h12V3z" /></svg>
        </button>
        <div class="more-wrap">
          <button id="toggle-more" class="tb-btn" title="More">
            <svg viewBox="0 0 24 24"><path d="M12 8c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm0 2c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0 6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z" /></svg>
          </button>
          <div id="more-menu" class="more-menu">
            <button class="menu-item" data-action="copy-view-link">Copy view link</button>
            <button class="menu-item" data-action="properties">Document properties</button>
            <button class="menu-item" data-action="chrome-viewer">Open in Chrome viewer</button>
            <div class="menu-divider"></div>
            <button class="menu-item menu-check" data-action="mode-device" data-checked="true"><span class="menu-ic">🖥</span>Device mode<span class="menu-tick">✓</span></button>
            <button class="menu-item menu-check" data-action="mode-light"><span class="menu-ic">☀</span>Light mode<span class="menu-tick">✓</span></button>
            <button class="menu-item menu-check" data-action="mode-dark"><span class="menu-ic">🌙</span>Dark mode<span class="menu-tick">✓</span></button>
            <button class="menu-item menu-check" data-action="mode-night"><span class="menu-ic">◗</span>Night mode<span class="menu-tick">✓</span></button>
            <div class="menu-divider"></div>
            <button class="menu-item" data-action="chrome-settings">Chrome settings</button>
            <div class="menu-divider"></div>
            <button class="menu-item" data-action="report">Report an issue</button>
          </div>
        </div>
      </div>
    </header>

    <div id="cite-dialog" class="cite-dialog">
      <div class="cite-header">Cite</div>
      <div id="cite-body" class="cite-body">
        <div class="cite-status">Looking up citation…</div>
      </div>
    </div>

    <div id="search-bar" class="search-bar">
      <svg class="search-bar-ic" viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z" /></svg>
      <input id="search-input" type="text" placeholder="Find in document" />
      <span id="search-count" class="search-count"></span>
      <button id="search-prev" class="search-nav" title="Previous match">
        <svg viewBox="0 0 24 24"><path d="M7.41 15.41 12 10.83l4.59 4.58L18 14l-6-6-6 6z" /></svg>
      </button>
      <button id="search-next" class="search-nav" title="Next match">
        <svg viewBox="0 0 24 24"><path d="M7.41 8.59 12 13.17l4.59-4.58L18 10l-6 6-6-6z" /></svg>
      </button>
      <button id="search-close" class="search-nav" title="Close">
        <svg viewBox="0 0 24 24"><path d="M19 6.41 17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z" /></svg>
      </button>
    </div>

    <!--
      Left sidebar reproduces Scholar Reader's `.gsr-nav`: a 300px overlay
      (304 default - 4px adjuster) that slides via translateX rather than
      reflowing; a 52px `.gsr-nav-tb` tab bar (Key points / Outline /
      Thumbnails, + our Library) with a 3px active indicator; a triangular
      `.gsr-nav-collapse-btn` on the right edge; a `.gsr-nav-width-adjuster`
      drag handle; and `.gsr-nav-expand-btn` chips that peek 40px when
      collapsed and slide out to reveal their label on hover/focus. The body's
      left inset is driven by `--nav-visible-width`. Outline/Thumbnails icons
      are the reference's own SVG paths.
    -->
    <div class="body">
      <div id="viewer" class="viewer">
        <div class="loading">Loading PDF…</div>
      </div>

      <aside id="nav" class="nav hidden">
        <div class="nav-tb">
          <button class="nav-tb-btn" data-tab="keypoints" title="Notes">
            <svg viewBox="0 0 24 24"><path d="M19 9l1.25-2.75L23 5l-2.75-1.25L19 1l-1.25 2.75L15 5l2.75 1.25L19 9zm-7.5.5L9 4 6.5 9.5 1 12l5.5 2.5L9 20l2.5-5.5L17 12l-5.5-2.5zM19 15l-1.25 2.75L15 19l2.75 1.25L19 23l1.25-2.75L23 19l-2.75-1.25L19 15z" /></svg>
          </button>
          <button class="nav-tb-btn active" data-tab="outline" title="Outline">
            <svg viewBox="0 0 21 21"><path d="M3.5 7.8C3.9 7.8 4.3 7.4 4.3 7C4.3 6.5 3.9 6 3.5 6C3 6 2.6 6.5 2.6 7C2.6 7.4 3 7.8 3.5 7.8ZM4.3 10.5C4.3 10.9 3.9 11.3 3.5 11.3C3 11.3 2.6 10.9 2.6 10.5C2.6 10 3 9.6 3.5 9.6C3.9 9.6 4.3 10 4.3 10.5ZM4.3 14C4.3 14.4 3.9 14.8 3.5 14.8C3 14.8 2.6 14.4 2.6 14C2.6 13.5 3 13 3.5 13C3.9 13 4.3 13.5 4.3 14ZM18.3 11.3H6V9.6H18.3V11.3ZM6 14.8H18.3V13H6V14.8ZM6 7.8V6H18.3V7.8H6Z" /></svg>
          </button>
          <button class="nav-tb-btn" data-tab="thumbnails" title="Thumbnails">
            <svg viewBox="0 0 21 21"><path d="M5.2 1.7H12.2L17.5 7V17.5C17.5 18.4 16.7 19.2 15.7 19.2H5.2C4.2 19.2 3.5 18.4 3.5 17.5L3.5 3.5C3.5 2.5 4.2 1.7 5.2 1.7ZM5.2 3.5V17.5H15.7V7.8H11.3V3.5H5.2Z" /></svg>
          </button>
          <button class="nav-tb-btn" data-tab="library" title="Library">
            <svg viewBox="0 0 24 24"><path d="M4 6H2v14c0 1.1.9 2 2 2h14v-2H4V6zm16-4H8c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-1 9H9V9h10v2zm-4 4H9v-2h6v2zm4-8H9V5h10v2z" /></svg>
          </button>
        </div>
        <div class="nav-content">
          <div class="nav-scroll">
            <div class="tab-content keypoints-panel" data-panel="keypoints">
              <div class="notes-toolbar">
                <button id="notes-mode-edit" class="notes-mode-btn active" title="Edit markdown">Edit</button>
                <button id="notes-mode-preview" class="notes-mode-btn" title="Rendered preview">Preview</button>
                <button id="notes-clip" class="notes-mode-btn" title="Clip a region of the page into your notes">Clip</button>
                <span id="notes-status" class="notes-status" role="status"></span>
                <button id="notes-save" class="notes-save-btn" title="Save notes now">Save</button>
              </div>
              <div id="ai-editor" class="ai-editor"></div>
              <div id="notes-preview" class="notes-preview" hidden></div>
              <div id="notes-error" class="notes-error" hidden></div>
            </div>
            <div id="outline-list" class="tab-content outline-list active" data-panel="outline"></div>
            <div id="pages-list" class="tab-content pages-list" data-panel="thumbnails"></div>
            <div id="library-list" class="tab-content library-list" data-panel="library">
              <div class="library-placeholder">
                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#cfcfcf" stroke-width="1.5">
                  <path d="M4 6H2v14a2 2 0 0 0 2 2h14v-2H4V6Z" />
                  <path d="M20 2H8a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2Z" />
                </svg>
                <div class="library-placeholder-title">Library</div>
                <p>Your file-system-backed library will live here.</p>
              </div>
            </div>
          </div>
        </div>
        <button id="nav-collapse" class="nav-collapse-btn" title="Collapse"></button>
        <div id="nav-adjuster" class="nav-width-adjuster" title="Drag to resize"></div>
      </aside>

      <div id="nav-rail" class="nav-expand-btns-ctn">
          <button class="nav-expand-btn" data-tab="keypoints">
            <span class="nav-expand-btn-content">
              <svg viewBox="0 0 24 24"><path d="M19 9l1.25-2.75L23 5l-2.75-1.25L19 1l-1.25 2.75L15 5l2.75 1.25L19 9zm-7.5.5L9 4 6.5 9.5 1 12l5.5 2.5L9 20l2.5-5.5L17 12l-5.5-2.5zM19 15l-1.25 2.75L15 19l2.75 1.25L19 23l1.25-2.75L23 19l-2.75-1.25L19 15z" /></svg>
              <span class="nav-expand-btn-text">Notes</span>
            </span>
          </button>
          <button class="nav-expand-btn" data-tab="outline">
            <span class="nav-expand-btn-content">
              <svg viewBox="0 0 21 21"><path d="M3.5 7.8C3.9 7.8 4.3 7.4 4.3 7C4.3 6.5 3.9 6 3.5 6C3 6 2.6 6.5 2.6 7C2.6 7.4 3 7.8 3.5 7.8ZM4.3 10.5C4.3 10.9 3.9 11.3 3.5 11.3C3 11.3 2.6 10.9 2.6 10.5C2.6 10 3 9.6 3.5 9.6C3.9 9.6 4.3 10 4.3 10.5ZM4.3 14C4.3 14.4 3.9 14.8 3.5 14.8C3 14.8 2.6 14.4 2.6 14C2.6 13.5 3 13 3.5 13C3.9 13 4.3 13.5 4.3 14ZM18.3 11.3H6V9.6H18.3V11.3ZM6 14.8H18.3V13H6V14.8ZM6 7.8V6H18.3V7.8H6Z" /></svg>
              <span class="nav-expand-btn-text">Outline</span>
            </span>
          </button>
          <button class="nav-expand-btn" data-tab="thumbnails">
            <span class="nav-expand-btn-content">
              <svg viewBox="0 0 21 21"><path d="M5.2 1.7H12.2L17.5 7V17.5C17.5 18.4 16.7 19.2 15.7 19.2H5.2C4.2 19.2 3.5 18.4 3.5 17.5L3.5 3.5C3.5 2.5 4.2 1.7 5.2 1.7ZM5.2 3.5V17.5H15.7V7.8H11.3V3.5H5.2Z" /></svg>
              <span class="nav-expand-btn-text">Thumbnails</span>
            </span>
          </button>
          <button class="nav-expand-btn" data-tab="library">
            <span class="nav-expand-btn-content">
              <svg viewBox="0 0 24 24"><path d="M4 6H2v14c0 1.1.9 2 2 2h14v-2H4V6zm16-4H8c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-1 9H9V9h10v2zm-4 4H9v-2h6v2zm4-8H9V5h10v2z" /></svg>
              <span class="nav-expand-btn-text">Library</span>
            </span>
          </button>
        </div>
      </div>

      <aside id="sidebar" class="side-panel right">
        <div class="panel-header">
          <span>Highlights</span>
          <button id="close-sidebar" class="icon-btn" title="Close">
            <svg viewBox="0 0 24 24"><path d="M19 6.41 17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z" /></svg>
          </button>
        </div>
        <div id="highlight-list" class="highlight-list"></div>
      </aside>
    </div>

    <div id="selection-popup" class="selection-popup">
      <button id="popup-comment" class="popup-comment-btn" title="Add comment" data-color="#ffe09d">
        <svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-1.99.9-1.99 2L2 22l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z" /></svg>
      </button>
      <div class="popup-swatches">
        <button data-color="#ffe09d" title="Amber highlight"><span style="background: #ffe09d"></span></button>
        <button data-color="#91edd0" title="Mint highlight"><span style="background: #91edd0"></span></button>
        <button data-color="#bed2f4" title="Blue highlight"><span style="background: #bed2f4"></span></button>
        <button data-color="#f8bfbf" title="Pink highlight"><span style="background: #f8bfbf"></span></button>
        <button data-color="#d8bef4" title="Purple highlight"><span style="background: #d8bef4"></span></button>
      </div>
    </div>
    <div id="clip-overlay" class="clip-overlay" hidden>
      <div id="clip-rect" class="clip-rect"></div>
    </div>
    <script type="module" src="reader.js"></script>
  </body>
</html>
