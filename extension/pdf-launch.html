<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Opening in MathRead</title>
    <link rel="stylesheet" href="pdf-launch.css" />
  </head>
  <body>
    <main id="mathread-pdf-launch" aria-live="polite">
      <svg class="mark" viewBox="0 0 24 24" aria-hidden="true">
        <rect x="10" y="5" width="4" height="15" rx="1" />
        <rect x="15" y="9" width="4" height="11" rx="1" />
        <rect x="3.5" y="7" width="4" height="13" rx="1" transform="rotate(-18 5.5 13.5)" />
      </svg>
      <p class="eyebrow">Opening PDF in</p>
      <h1>MathRead</h1>
      <p id="mathread-launch-status" class="status">Capturing the source document…</p>
      <p id="mathread-launch-source" class="source"></p>
      <span class="progress" aria-hidden="true"></span>
    </main>
    <script type="module" src="mathread/pdf-launch.js"></script>
  </body>
</html>
